name: CI LLMSecOps

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  quality-security:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: '1'
      DATABASE_URL: postgresql://smartfin:smartfin@localhost:5432/smartfin

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartfin
          POSTGRES_PASSWORD: smartfin
          POSTGRES_DB: smartfin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Ruff
        run: ruff check app/config.py app/api.py app/guardrails ui/app.py tests/security tests/unit/test_config.py scripts/llmsecops_ci.py

      - name: Unit tests
        run: python -m pytest tests/unit -v

      - name: Integration tests
        run: python -m pytest tests/integration -v

      - name: Security tests
        run: python -m pytest tests/security -v

      - name: Capability evals
        env:
          SMARTFIN_EVAL_SUITE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
          SMARTFIN_EVAL_PROVIDER: ${{ secrets.SMARTFIN_EVAL_PROVIDER || 'openai-compatible' }}
          SMARTFIN_EVAL_BASE_URL: ${{ secrets.SMARTFIN_EVAL_BASE_URL }}
          SMARTFIN_EVAL_API_KEY: ${{ secrets.SMARTFIN_EVAL_API_KEY }}
          SMARTFIN_EVAL_MODEL: ${{ secrets.SMARTFIN_EVAL_MODEL || 'deepseek-v4-pro' }}
          SMARTFIN_EVAL_JUDGE_MODEL: ${{ secrets.SMARTFIN_EVAL_JUDGE_MODEL || 'deepseek-v4-pro' }}
        run: |
          if [ -z "$SMARTFIN_EVAL_BASE_URL" ] || [ -z "$SMARTFIN_EVAL_API_KEY" ]; then
            echo "SMARTFIN_EVAL_BASE_URL and SMARTFIN_EVAL_API_KEY must be configured for CI capability evals."
            exit 1
          fi
          python -m pytest tests/evals -m eval -v

      - name: Publish capability eval summary
        if: always()
        run: |
          if [ -f reports/evals/summary.md ]; then
            cat reports/evals/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Capability eval summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload capability eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capability-eval-reports
          path: reports/evals
          if-no-files-found: ignore

      - name: LLMSecOps policy checks
        run: python scripts/llmsecops_ci.py

      - name: Static security scan
        run: bandit -q -r app scripts

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Build backend Docker image
        run: docker build -f Dockerfile.backend -t smartfin-backend:ci .

      - name: Build frontend Docker image
        run: docker build -f Dockerfile.frontend -t smartfin-frontend:ci .
