name: CI LLMSecOps

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  quality-security:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: '1'
      DATABASE_URL: postgresql://smartfin:smartfin@localhost:5432/smartfin

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartfin
          POSTGRES_PASSWORD: smartfin
          POSTGRES_DB: smartfin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Ruff
        run: ruff check app/config.py app/api.py app/guardrails ui/app.py tests/security tests/unit/test_config.py scripts/llmsecops_ci.py

      - name: Unit tests
        run: python -m pytest tests/unit -v

      - name: Integration tests
        run: python -m pytest tests/integration -v

      - name: Security tests
        run: python -m pytest tests/security -v

      - name: LLMSecOps policy checks
        run: python scripts/llmsecops_ci.py

      - name: Static security scan
        run: bandit -q -r app scripts

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Build backend Docker image
        run: docker build -f Dockerfile.backend -t smartfin-backend:ci .

      - name: Build frontend Docker image
        run: docker build -f Dockerfile.frontend -t smartfin-frontend:ci .

  deploy:
    needs: quality-security
    if: >
      github.event_name == 'push' &&
      (
        github.ref_name == 'main' ||
        github.ref_name == 'master' ||
        github.ref_name == 'dev'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: smartfin-deploy-${{ github.ref_name }}
      cancel-in-progress: true
    env:
      DEPLOY_PATH: /opt/smartfin
      SOURCE_PATHS: app,ui,config,scripts,nginx,tests/fixtures,requirements.txt,pyproject.toml,docker-compose.yml,Dockerfile.backend,Dockerfile.frontend,.dockerignore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare remote deployment directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -eu
            mkdir -p "${{ env.DEPLOY_PATH }}"
            rm -rf \
              "${{ env.DEPLOY_PATH }}/app" \
              "${{ env.DEPLOY_PATH }}/ui" \
              "${{ env.DEPLOY_PATH }}/config" \
              "${{ env.DEPLOY_PATH }}/scripts" \
              "${{ env.DEPLOY_PATH }}/tests" \
              "${{ env.DEPLOY_PATH }}/requirements.txt" \
              "${{ env.DEPLOY_PATH }}/pyproject.toml" \
              "${{ env.DEPLOY_PATH }}/docker-compose.yml" \
              "${{ env.DEPLOY_PATH }}/Dockerfile.backend" \
              "${{ env.DEPLOY_PATH }}/Dockerfile.frontend" \
              "${{ env.DEPLOY_PATH }}/.dockerignore"

      - name: Upload application source
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: ${{ env.SOURCE_PATHS }}
          target: ${{ env.DEPLOY_PATH }}

      - name: Render runtime environment and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -eu
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the target server."
              exit 1
            fi

            cat > "${{ env.DEPLOY_PATH }}/.env" <<'EOF'
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }}
            LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }}
            SMARTFIN_MODEL=${{ secrets.SMARTFIN_MODEL }}
            SMARTFIN_ENFORCE_APPROVED_MODELS=${{ secrets.SMARTFIN_ENFORCE_APPROVED_MODELS }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            SMARTFIN_LOG_FORMAT=${{ secrets.SMARTFIN_LOG_FORMAT }}
            EOF
            chmod 600 "${{ env.DEPLOY_PATH }}/.env"

            cd "${{ env.DEPLOY_PATH }}"
            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build --remove-orphans
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose up -d --build --remove-orphans
            else
              echo "Docker Compose is not installed on the target server."
              exit 1
            fi
