services:
  # ---------------------------------------------------------------------------
  # LiteLLM Gateway — OpenAI-compatible proxy in front of Anthropic.
  # All LLM calls from the backend route through here.
  # Real ANTHROPIC_API_KEY is scoped to this container only.
  # Virtual keys are stored in the shared Postgres instance (litellm_* tables).
  #
  # Security: pin to a specific digest in production rather than a tag.
  # Check https://github.com/BerriAI/litellm/releases for the latest stable.
  # CVE-2024-6587 (SSRF) and related auth-bypass CVEs are fixed in 1.40+.
  # ---------------------------------------------------------------------------
  gateway:
    image: ghcr.io/berriai/litellm:v1.89.0
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./gateway/config.yaml:/app/config.yaml:ro
      - ./gateway:/app/gateway:ro
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      # Prisma (used by LiteLLM internally) reads DATABASE_URL — not a custom var.
      # Both gateway and backend point to the same Postgres; LiteLLM creates its
      # own tables (LiteLLM_* prefix) and does not conflict with LangGraph tables.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}            # for text-embedding-3-small (memory module)
      DATABASE_URL: postgresql://smartfin:${POSTGRES_PASSWORD:-smartfin}@postgres:5432/smartfin
      PYTHONPATH: /app
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      - smartfin-net

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartfin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfin}
      POSTGRES_DB: smartfin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smartfin-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - smartfin-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- LLM Gateway ---
      # All LLM and embedding calls route through the gateway; raw API keys
      # never enter this container.
      LITELLM_BASE_URL: http://gateway:4000/v1
      LITELLM_VIRTUAL_KEY: ${LITELLM_VIRTUAL_KEY:-}    # issued via POST /key/generate
      # --- LangSmith Tracing ---
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartfin}
      # --- Model / App config ---
      SMARTFIN_MODEL: ${SMARTFIN_MODEL:-claude-haiku-4-5}
      SMARTFIN_ENFORCE_APPROVED_MODELS: ${SMARTFIN_ENFORCE_APPROVED_MODELS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SMARTFIN_LOG_FORMAT: ${SMARTFIN_LOG_FORMAT:-plain}
      DATABASE_URL: postgresql://smartfin:${POSTGRES_PASSWORD:-smartfin}@postgres:5432/smartfin
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - smartfin-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      SMARTFIN_BACKEND_URL: http://backend:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}            # for text-embedding-3-small (memory module)
      DATABASE_URL: postgresql://smartfin:${POSTGRES_PASSWORD:-smartfin}@postgres:5432/smartfin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - smartfin-net

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - smartfin-net

volumes:
  pgdata:
  redisdata:

networks:
  smartfin-net:
